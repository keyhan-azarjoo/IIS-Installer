<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LM Studio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;height:100vh;display:flex;flex-direction:column}
.header{background:#1e293b;border-bottom:1px solid #334155;padding:12px 24px;display:flex;align-items:center;gap:16px;flex-shrink:0}
.header h1{font-size:20px;font-weight:800;color:#a78bfa;flex-grow:0}
.header select{background:#334155;color:#e2e8f0;border:1px solid #475569;border-radius:8px;padding:8px 12px;font-size:14px;outline:none;min-width:200px}
.header .status{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:13px;color:#94a3b8}
.header .status .dot{width:8px;height:8px;border-radius:50%;background:#ef4444}.header .status .dot.ok{background:#22c55e}
.header .btn-sm{background:#334155;color:#94a3b8;border:1px solid #475569;border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer}
.header .btn-sm:hover{background:#475569;color:#e2e8f0}
.chat-area{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
.msg{max-width:80%;display:flex;flex-direction:column;gap:4px}
.msg.user{align-self:flex-end}.msg.assistant{align-self:flex-start}
.msg .bubble{padding:14px 18px;border-radius:16px;line-height:1.6;font-size:15px;white-space:pre-wrap;word-break:break-word}
.msg.user .bubble{background:#7c3aed;color:#fff;border-bottom-right-radius:4px}
.msg.assistant .bubble{background:#1e293b;color:#e2e8f0;border:1px solid #334155;border-bottom-left-radius:4px}
.empty{text-align:center;margin:auto;color:#475569}
.empty h2{font-size:28px;font-weight:800;color:#334155;margin-bottom:8px}
.input-area{background:#1e293b;border-top:1px solid #334155;padding:16px 24px;flex-shrink:0}
.input-row{display:flex;gap:12px;max-width:900px;margin:0 auto}
.input-row textarea{flex:1;background:#0f172a;color:#e2e8f0;border:1px solid #334155;border-radius:12px;padding:12px 16px;font-size:15px;font-family:inherit;resize:none;outline:none;min-height:48px;max-height:200px}
.input-row textarea:focus{border-color:#a78bfa}
.send-btn{background:#7c3aed;color:#fff;border:none;border-radius:12px;padding:0 20px;font-size:15px;font-weight:700;cursor:pointer;min-width:80px}
.send-btn:hover{background:#6d28d9}.send-btn:disabled{background:#334155;color:#64748b;cursor:not-allowed}
</style>
</head>
<body>
<div class="header">
  <h1>LM Studio</h1>
  <select id="modelSelect"><option value="">Loading models...</option></select>
  <div class="status"><div class="dot" id="statusDot"></div><span id="statusText">Checking...</span></div>
  <button class="btn-sm" onclick="clearChat()">Clear</button>
</div>
<div class="chat-area" id="chatArea">
  <div class="empty" id="emptyState"><h2>LM Studio Chat</h2><p>Select a model and start chatting.</p></div>
</div>
<div class="input-area">
  <div class="input-row">
    <textarea id="msgInput" placeholder="Type a message... (Enter to send)" rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
  </div>
</div>
<script>
let messages=[], streaming=false;
async function checkHealth(){
  try{const r=await fetch('/api/health');const j=await r.json();
    document.getElementById('statusDot').className='dot'+(j.ok?' ok':'');
    document.getElementById('statusText').textContent=j.ok?'Connected':'Disconnected';return j.ok;
  }catch(e){document.getElementById('statusDot').className='dot';document.getElementById('statusText').textContent='Disconnected';return false;}
}
async function loadModels(){
  try{const r=await fetch('/api/models');const j=await r.json();const sel=document.getElementById('modelSelect');
    const models=j.models||[];sel.innerHTML=models.length?'':'<option value="">No models loaded</option>';
    models.forEach(m=>{const opt=document.createElement('option');opt.value=m.id;opt.textContent=m.id;sel.appendChild(opt);});
  }catch(e){}
}
function addMsg(role,content){
  const area=document.getElementById('chatArea');document.getElementById('emptyState').style.display='none';
  const div=document.createElement('div');div.className='msg '+role;
  div.innerHTML='<div class="bubble"></div>';div.querySelector('.bubble').textContent=content;
  area.appendChild(div);area.scrollTop=area.scrollHeight;return div;
}
async function sendMessage(){
  const input=document.getElementById('msgInput');const text=input.value.trim();
  const model=document.getElementById('modelSelect').value;
  if(!text||!model||streaming)return;
  messages.push({role:'user',content:text});addMsg('user',text);
  input.value='';input.style.height='auto';streaming=true;document.getElementById('sendBtn').disabled=true;
  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model,messages,stream:false})});
    const j=await r.json();
    if(j.ok&&j.choices&&j.choices[0]){
      const content=j.choices[0].message.content;messages.push({role:'assistant',content});addMsg('assistant',content);
    }else if(j.error){addMsg('assistant','Error: '+j.error);}
    else{addMsg('assistant','No response from model.');}
  }catch(e){addMsg('assistant','Error: '+e);}
  streaming=false;document.getElementById('sendBtn').disabled=false;input.focus();
}
function clearChat(){messages=[];document.getElementById('chatArea').innerHTML='<div class="empty" id="emptyState"><h2>LM Studio Chat</h2><p>Select a model and start chatting.</p></div>';}
document.getElementById('msgInput').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,200)+'px';});
document.getElementById('msgInput').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
checkHealth().then(ok=>{if(ok)loadModels();});setInterval(checkHealth,15000);
</script>
</body>
</html>
