<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ollama - Sign In</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;height:100vh;display:flex;align-items:center;justify-content:center}
.login-card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:48px;width:100%;max-width:420px;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5)}
.logo{text-align:center;margin-bottom:32px}
.logo h1{font-size:32px;font-weight:800;color:#60a5fa;margin-bottom:4px}
.logo p{color:#64748b;font-size:14px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:13px;font-weight:600;color:#94a3b8;margin-bottom:6px}
.form-group input{width:100%;background:#0f172a;color:#e2e8f0;border:1px solid #334155;border-radius:10px;padding:12px 16px;font-size:15px;outline:none;transition:border-color .2s}
.form-group input:focus{border-color:#60a5fa}
.form-group input::placeholder{color:#475569}
.error-msg{color:#ef4444;font-size:13px;margin-bottom:16px;display:none;text-align:center}
.login-btn{width:100%;background:#2563eb;color:#fff;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;transition:background .2s}
.login-btn:hover{background:#1d4ed8}
.login-btn:disabled{background:#334155;color:#64748b;cursor:not-allowed}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <h1>Ollama</h1>
    <p>Sign in to continue</p>
  </div>
  <div id="error" class="error-msg"></div>
  <div class="form-group">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter username" autofocus>
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password">
  </div>
  <button class="login-btn" id="loginBtn" onclick="doLogin()">Sign In</button>
</div>
<script>
function doLogin() {
  var username = document.getElementById('username').value.trim();
  var password = document.getElementById('password').value;
  var errEl = document.getElementById('error');
  var btn = document.getElementById('loginBtn');
  if (!username || !password) { errEl.textContent = 'Please enter username and password'; errEl.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Signing in...'; errEl.style.display = 'none';
  fetch('/api/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({username: username, password: password}) })
  .then(function(r) { return r.json(); })
  .then(function(j) {
    if (j.ok) { window.location.href = '/'; }
    else { errEl.textContent = j.error || 'Invalid credentials'; errEl.style.display = 'block'; btn.disabled = false; btn.textContent = 'Sign In'; }
  })
  .catch(function(e) { errEl.textContent = 'Connection error'; errEl.style.display = 'block'; btn.disabled = false; btn.textContent = 'Sign In'; });
}
document.getElementById('password').addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
document.getElementById('username').addEventListener('keydown', function(e) { if (e.key === 'Enter') document.getElementById('password').focus(); });
</script>
</body>
</html>
