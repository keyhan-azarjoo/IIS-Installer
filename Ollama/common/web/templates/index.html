<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ollama Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;height:100vh;display:flex;overflow:hidden}

/* Sidebar */
.sidebar{width:280px;background:#1e293b;border-right:1px solid #334155;display:flex;flex-direction:column;flex-shrink:0;height:100vh}
.sidebar-header{padding:16px;border-bottom:1px solid #334155;display:flex;align-items:center;gap:12px}
.sidebar-header h1{font-size:18px;font-weight:800;color:#60a5fa;flex:1}
.new-chat-btn{background:#2563eb;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.new-chat-btn:hover{background:#1d4ed8}
.chat-list{flex:1;overflow-y:auto;padding:8px}
.chat-item{padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:#94a3b8;display:flex;align-items:center;gap:8px;margin-bottom:2px;position:relative}
.chat-item:hover{background:#334155;color:#e2e8f0}
.chat-item.active{background:#334155;color:#e2e8f0}
.chat-item .chat-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-item .chat-delete{display:none;background:none;border:none;color:#ef4444;font-size:16px;cursor:pointer;padding:0 4px;flex-shrink:0}
.chat-item:hover .chat-delete{display:block}
.sidebar-footer{padding:12px 16px;border-top:1px solid #334155;font-size:11px;color:#475569}

/* Main area */
.main{flex:1;display:flex;flex-direction:column;height:100vh;min-width:0}
.header{background:#1e293b;border-bottom:1px solid #334155;padding:10px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.header select{background:#334155;color:#e2e8f0;border:1px solid #475569;border-radius:8px;padding:7px 12px;font-size:13px;outline:none;min-width:180px}
.header select:focus{border-color:#60a5fa}
.header .status{display:flex;align-items:center;gap:6px;font-size:12px;color:#94a3b8}
.header .dot{width:8px;height:8px;border-radius:50%;background:#ef4444}
.header .dot.ok{background:#22c55e}
.header .spacer{flex:1}
.header .btn-sm{background:#334155;color:#94a3b8;border:1px solid #475569;border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer}
.header .btn-sm:hover{background:#475569;color:#e2e8f0}
.header .btn-sm.active{background:#2563eb;color:#fff;border-color:#2563eb}

/* Settings panel */
.settings-panel{display:none;background:#1e293b;border-bottom:1px solid #334155;padding:16px 20px;flex-shrink:0}
.settings-panel.open{display:block}
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:700px}
.setting-group{display:flex;flex-direction:column;gap:4px}
.setting-group label{font-size:11px;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.setting-group input,.setting-group textarea,.setting-group select{background:#0f172a;color:#e2e8f0;border:1px solid #334155;border-radius:6px;padding:8px 10px;font-size:13px;outline:none;font-family:inherit}
.setting-group input:focus,.setting-group textarea:focus{border-color:#60a5fa}
.setting-group textarea{resize:vertical;min-height:60px}
.setting-group.full{grid-column:1/-1}
.setting-group .range-row{display:flex;align-items:center;gap:8px}
.setting-group input[type=range]{flex:1;accent-color:#60a5fa}
.setting-group .range-val{font-size:12px;color:#60a5fa;min-width:35px;text-align:right}

/* Chat */
.chat-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.msg{max-width:80%;display:flex;flex-direction:column;gap:4px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end}
.msg.assistant{align-self:flex-start}
.msg .bubble{padding:14px 18px;border-radius:16px;line-height:1.7;font-size:14px;word-break:break-word}
.msg.user .bubble{background:#2563eb;color:#fff;border-bottom-right-radius:4px}
.msg.assistant .bubble{background:#1e293b;color:#e2e8f0;border:1px solid #334155;border-bottom-left-radius:4px}
.msg .meta{font-size:11px;color:#64748b;padding:0 4px}
.msg.user .meta{text-align:right}
.msg.system .bubble{background:#1a1a2e;color:#94a3b8;border:1px dashed #334155;font-size:13px;font-style:italic;max-width:90%;align-self:center}
.typing{align-self:flex-start;color:#64748b;font-size:14px;padding:8px 0}
.typing span{animation:blink 1.4s infinite both}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}
.empty{text-align:center;margin:auto;color:#475569}
.empty h2{font-size:28px;font-weight:800;color:#334155;margin-bottom:8px}
.empty p{font-size:14px;max-width:400px;line-height:1.6}

/* Markdown in bubbles */
.msg.assistant .bubble pre{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:12px;margin:8px 0;overflow-x:auto;font-size:13px;line-height:1.5;position:relative}
.msg.assistant .bubble pre code{background:none;border:none;padding:0;font-size:13px;color:#e2e8f0}
.msg.assistant .bubble code{background:#334155;padding:2px 6px;border-radius:4px;font-size:13px}
.msg.assistant .bubble p{margin:6px 0}
.msg.assistant .bubble ul,.msg.assistant .bubble ol{margin:6px 0;padding-left:20px}
.msg.assistant .bubble li{margin:3px 0}
.msg.assistant .bubble h1,.msg.assistant .bubble h2,.msg.assistant .bubble h3{margin:10px 0 6px;color:#60a5fa}
.msg.assistant .bubble blockquote{border-left:3px solid #60a5fa;padding-left:12px;margin:8px 0;color:#94a3b8}
.msg.assistant .bubble table{border-collapse:collapse;margin:8px 0;width:100%}
.msg.assistant .bubble th,.msg.assistant .bubble td{border:1px solid #334155;padding:6px 10px;font-size:13px;text-align:left}
.msg.assistant .bubble th{background:#334155}
.copy-btn{position:absolute;top:6px;right:6px;background:#475569;color:#e2e8f0;border:none;border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;opacity:0;transition:opacity .2s}
pre:hover .copy-btn{opacity:1}
.copy-btn:hover{background:#60a5fa}

/* Input */
.input-area{background:#1e293b;border-top:1px solid #334155;padding:14px 20px;flex-shrink:0}
.input-row{display:flex;gap:10px;max-width:900px;margin:0 auto;align-items:flex-end}
.input-row textarea{flex:1;background:#0f172a;color:#e2e8f0;border:1px solid #334155;border-radius:12px;padding:12px 16px;font-size:14px;font-family:inherit;resize:none;outline:none;min-height:48px;max-height:200px}
.input-row textarea:focus{border-color:#60a5fa}
.input-row textarea::placeholder{color:#475569}
.send-btn{background:#2563eb;color:#fff;border:none;border-radius:12px;padding:12px 20px;font-size:14px;font-weight:700;cursor:pointer;min-width:70px;transition:all .15s}
.send-btn:hover{background:#1d4ed8}
.send-btn:disabled{background:#334155;color:#64748b;cursor:not-allowed}
.stop-btn{background:#ef4444;color:#fff;border:none;border-radius:12px;padding:12px 20px;font-size:14px;font-weight:700;cursor:pointer;min-width:70px}
.stop-btn:hover{background:#dc2626}

/* Models panel */
.models-panel{position:fixed;top:0;right:0;width:380px;height:100vh;background:#1e293b;border-left:1px solid #334155;z-index:100;transform:translateX(100%);transition:transform .3s ease;overflow-y:auto;padding:24px}
.models-panel.open{transform:translateX(0)}
.models-panel h2{font-size:18px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.models-panel .close-btn{background:none;border:none;color:#94a3b8;font-size:24px;cursor:pointer}
.model-card{background:#0f172a;border:1px solid #334155;border-radius:10px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.model-card .name{flex:1;font-weight:600;font-size:14px}
.model-card .size{color:#64748b;font-size:12px}
.model-card .del-btn{background:#7f1d1d;color:#fca5a5;border:none;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer}
.model-card .del-btn:hover{background:#991b1b}
.pull-row{display:flex;gap:8px;margin-bottom:16px}
.pull-row input{flex:1;background:#0f172a;color:#e2e8f0;border:1px solid #334155;border-radius:8px;padding:10px;font-size:14px;outline:none}
.pull-row input:focus{border-color:#60a5fa}
.pull-row button{background:#2563eb;color:#fff;border:none;border-radius:8px;padding:10px 16px;font-weight:700;cursor:pointer}
.pull-row button:hover{background:#1d4ed8}
.pull-status{font-size:12px;color:#94a3b8;margin-bottom:12px;min-height:18px}

/* Responsive */
@media(max-width:768px){
  .sidebar{width:0;position:absolute;z-index:200;transition:width .3s}
  .sidebar.mobile-open{width:280px}
}
</style>
</head>
<body>

<!-- Sidebar: Chat History -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>Ollama</h1>
    <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
  </div>
  <div class="chat-list" id="chatList"></div>
  <div class="sidebar-footer">Chat history saved locally</div>
</div>

<!-- Main Chat Area -->
<div class="main">
  <div class="header">
    <select id="modelSelect"><option value="">Loading models...</option></select>
    <div class="status"><div class="dot" id="statusDot"></div><span id="statusText">Checking...</span></div>
    <div class="spacer"></div>
    <button class="btn-sm" id="settingsBtn" onclick="toggleSettings()">Settings</button>
    <button class="btn-sm" onclick="toggleModels()">Models</button>
  </div>

  <!-- Settings Panel -->
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-grid">
      <div class="setting-group full">
        <label>System Prompt</label>
        <textarea id="systemPrompt" placeholder="You are a helpful assistant..." rows="3"></textarea>
      </div>
      <div class="setting-group">
        <label>Temperature</label>
        <div class="range-row">
          <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7">
          <span class="range-val" id="tempVal">0.7</span>
        </div>
      </div>
      <div class="setting-group">
        <label>Top P</label>
        <div class="range-row">
          <input type="range" id="topP" min="0" max="1" step="0.05" value="0.9">
          <span class="range-val" id="topPVal">0.9</span>
        </div>
      </div>
      <div class="setting-group">
        <label>Context Length</label>
        <input type="number" id="contextLen" value="4096" min="256" max="131072" step="256">
      </div>
      <div class="setting-group">
        <label>Max Tokens (0 = unlimited)</label>
        <input type="number" id="maxTokens" value="0" min="0" max="131072" step="64">
      </div>
    </div>
  </div>

  <!-- Chat Messages -->
  <div class="chat-area" id="chatArea">
    <div class="empty" id="emptyState">
      <h2>Ollama Chat</h2>
      <p>Select a model and start chatting. Pull new models from the Models panel.</p>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <textarea id="msgInput" placeholder="Type a message... (Enter to send, Shift+Enter for new line)" rows="1"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<!-- Models Panel -->
<div class="models-panel" id="modelsPanel">
  <h2>Models <button class="close-btn" onclick="toggleModels()">&times;</button></h2>
  <div class="pull-row">
    <input id="pullInput" placeholder="e.g. llama3.2, mistral, gemma2" onkeydown="if(event.key==='Enter')pullModel()">
    <button onclick="pullModel()">Pull</button>
  </div>
  <div class="pull-status" id="pullStatus"></div>
  <div id="modelsList"></div>
</div>

<script>
var BASE = '';
var conversations = {};
var currentChatId = null;
var streaming = false;
var abortController = null;

// ── LocalStorage helpers ────────────────────────────────────────
function saveConversations() {
  try { localStorage.setItem('ollama_conversations', JSON.stringify(conversations)); } catch(e) {}
}
function loadConversations() {
  try {
    var stored = localStorage.getItem('ollama_conversations');
    if (stored) conversations = JSON.parse(stored);
  } catch(e) { conversations = {}; }
}
function saveSettings() {
  try {
    localStorage.setItem('ollama_settings', JSON.stringify({
      systemPrompt: document.getElementById('systemPrompt').value,
      temperature: document.getElementById('temperature').value,
      topP: document.getElementById('topP').value,
      contextLen: document.getElementById('contextLen').value,
      maxTokens: document.getElementById('maxTokens').value,
      model: document.getElementById('modelSelect').value
    }));
  } catch(e) {}
}
function loadSettings() {
  try {
    var stored = localStorage.getItem('ollama_settings');
    if (stored) {
      var s = JSON.parse(stored);
      if (s.systemPrompt) document.getElementById('systemPrompt').value = s.systemPrompt;
      if (s.temperature) { document.getElementById('temperature').value = s.temperature; document.getElementById('tempVal').textContent = s.temperature; }
      if (s.topP) { document.getElementById('topP').value = s.topP; document.getElementById('topPVal').textContent = s.topP; }
      if (s.contextLen) document.getElementById('contextLen').value = s.contextLen;
      if (s.maxTokens !== undefined) document.getElementById('maxTokens').value = s.maxTokens;
      return s;
    }
  } catch(e) {}
  return null;
}

// ── Chat Management ─────────────────────────────────────────────
function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 5); }

function newChat() {
  var id = generateId();
  conversations[id] = { id: id, title: 'New Chat', messages: [], created: Date.now() };
  currentChatId = id;
  saveConversations();
  renderChatList();
  renderMessages();
}

function switchChat(id) {
  if (streaming) return;
  currentChatId = id;
  renderChatList();
  renderMessages();
}

function deleteChat(id, evt) {
  evt.stopPropagation();
  if (!confirm('Delete this conversation?')) return;
  delete conversations[id];
  if (currentChatId === id) {
    var keys = Object.keys(conversations);
    currentChatId = keys.length > 0 ? keys[keys.length - 1] : null;
  }
  saveConversations();
  renderChatList();
  renderMessages();
}

function updateChatTitle(id) {
  var conv = conversations[id];
  if (!conv || conv.messages.length === 0) return;
  for (var i = 0; i < conv.messages.length; i++) {
    if (conv.messages[i].role === 'user') {
      var title = conv.messages[i].content.substring(0, 40);
      if (conv.messages[i].content.length > 40) title += '...';
      conv.title = title;
      break;
    }
  }
  saveConversations();
  renderChatList();
}

function renderChatList() {
  var list = document.getElementById('chatList');
  var keys = Object.keys(conversations).sort(function(a, b) {
    return (conversations[b].created || 0) - (conversations[a].created || 0);
  });
  var html = '';
  for (var i = 0; i < keys.length; i++) {
    var conv = conversations[keys[i]];
    var active = keys[i] === currentChatId ? ' active' : '';
    html += '<div class="chat-item' + active + '" onclick="switchChat(\'' + keys[i] + '\')">'
      + '<span class="chat-title">' + escapeHtml(conv.title || 'New Chat') + '</span>'
      + '<button class="chat-delete" onclick="deleteChat(\'' + keys[i] + '\', event)">&times;</button>'
      + '</div>';
  }
  list.innerHTML = html;
}

// ── Markdown Renderer ───────────────────────────────────────────
function renderMarkdown(text) {
  // Code blocks
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, function(m, lang, code) {
    return '<pre><code class="language-' + lang + '">' + escapeHtml(code.trim()) + '</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></pre>';
  });
  // Inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Headers
  text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Blockquotes
  text = text.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  // Unordered lists
  text = text.replace(/^[*-] (.+)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
  // Ordered lists
  text = text.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  // Links
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:#60a5fa">$1</a>');
  // Line breaks (but not inside pre blocks)
  var parts = text.split(/<pre[\s\S]*?<\/pre>/g);
  var pres = text.match(/<pre[\s\S]*?<\/pre>/g) || [];
  var result = '';
  for (var i = 0; i < parts.length; i++) {
    result += parts[i].replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>');
    if (i < pres.length) result += pres[i];
  }
  return '<p>' + result + '</p>';
}

function escapeHtml(s) {
  var div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function copyCode(btn) {
  var code = btn.parentElement.querySelector('code');
  navigator.clipboard.writeText(code.textContent);
  btn.textContent = 'Copied!';
  setTimeout(function() { btn.textContent = 'Copy'; }, 2000);
}

// ── Render Messages ─────────────────────────────────────────────
function renderMessages() {
  var area = document.getElementById('chatArea');
  if (!currentChatId || !conversations[currentChatId]) {
    area.innerHTML = '<div class="empty" id="emptyState"><h2>Ollama Chat</h2><p>Select a model and start chatting. Pull new models from the Models panel.</p></div>';
    return;
  }
  var msgs = conversations[currentChatId].messages;
  if (msgs.length === 0) {
    area.innerHTML = '<div class="empty" id="emptyState"><h2>Ollama Chat</h2><p>Select a model and start chatting.</p></div>';
    return;
  }
  var html = '';
  for (var i = 0; i < msgs.length; i++) {
    var m = msgs[i];
    if (m.role === 'system') continue;
    var time = m.time ? new Date(m.time).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '';
    if (m.role === 'user') {
      html += '<div class="msg user"><div class="bubble">' + escapeHtml(m.content) + '</div><div class="meta">' + time + '</div></div>';
    } else {
      html += '<div class="msg assistant"><div class="bubble">' + renderMarkdown(m.content) + '</div><div class="meta">' + (m.model ? m.model + ' &middot; ' : '') + time + '</div></div>';
    }
  }
  area.innerHTML = html;
  area.scrollTop = area.scrollHeight;
}

// ── Health Check ────────────────────────────────────────────────
function checkHealth() {
  fetch(BASE + '/api/health').then(function(r) { return r.json(); }).then(function(j) {
    document.getElementById('statusDot').className = 'dot' + (j.ok ? ' ok' : '');
    document.getElementById('statusText').textContent = j.ok ? 'Connected' : 'Disconnected';
    if (j.ok) loadModels();
  }).catch(function() {
    document.getElementById('statusDot').className = 'dot';
    document.getElementById('statusText').textContent = 'Disconnected';
  });
}

// ── Load Models ─────────────────────────────────────────────────
var savedModel = '';
function loadModels() {
  fetch(BASE + '/api/models').then(function(r) { return r.json(); }).then(function(j) {
    var sel = document.getElementById('modelSelect');
    var models = j.models || [];
    var prev = sel.value || savedModel;
    sel.innerHTML = models.length ? '' : '<option value="">No models — pull one first</option>';
    for (var i = 0; i < models.length; i++) {
      var m = models[i];
      var name = m.name || m.model;
      var size = m.size ? (m.size / 1e9).toFixed(1) + 'GB' : '';
      var opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name + (size ? ' (' + size + ')' : '');
      if (name === prev) opt.selected = true;
      sel.appendChild(opt);
    }
    // Models panel
    var list = document.getElementById('modelsList');
    var html = '';
    for (var i = 0; i < models.length; i++) {
      var m = models[i];
      var name = m.name || m.model;
      var size = m.size ? (m.size / 1e9).toFixed(1) + ' GB' : '';
      var family = m.details ? (m.details.family || '') : '';
      var params = m.details ? (m.details.parameter_size || '') : '';
      var info = [params, family, size].filter(function(x){return x;}).join(' &middot; ');
      html += '<div class="model-card"><span class="name">' + escapeHtml(name) + '</span><span class="size">' + info + '</span><button class="del-btn" onclick="deleteModel(\'' + escapeHtml(name) + '\')">Delete</button></div>';
    }
    list.innerHTML = html;
  }).catch(function() {});
}

// ── Send Message ────────────────────────────────────────────────
function sendMessage() {
  var input = document.getElementById('msgInput');
  var text = input.value.trim();
  var model = document.getElementById('modelSelect').value;
  if (!text || !model || streaming) return;

  if (!currentChatId) newChat();
  var conv = conversations[currentChatId];

  var systemPrompt = document.getElementById('systemPrompt').value.trim();
  var temp = parseFloat(document.getElementById('temperature').value);
  var topP = parseFloat(document.getElementById('topP').value);
  var ctxLen = parseInt(document.getElementById('contextLen').value) || 4096;
  var maxTok = parseInt(document.getElementById('maxTokens').value) || 0;

  conv.messages.push({ role: 'user', content: text, time: Date.now() });
  if (conv.messages.length <= 2) updateChatTitle(currentChatId);
  renderMessages();
  input.value = '';
  input.style.height = 'auto';
  saveConversations();
  saveSettings();

  streaming = true;
  var sendBtn = document.getElementById('sendBtn');
  sendBtn.textContent = 'Stop';
  sendBtn.className = 'stop-btn';
  sendBtn.onclick = stopGeneration;

  // Show typing indicator
  var area = document.getElementById('chatArea');
  var typingDiv = document.createElement('div');
  typingDiv.className = 'typing';
  typingDiv.id = 'typingIndicator';
  typingDiv.innerHTML = '<span>\u25CF</span><span>\u25CF</span><span>\u25CF</span>';
  area.appendChild(typingDiv);
  area.scrollTop = area.scrollHeight;

  // Build messages for API
  var apiMessages = [];
  if (systemPrompt) apiMessages.push({ role: 'system', content: systemPrompt });
  for (var i = 0; i < conv.messages.length; i++) {
    apiMessages.push({ role: conv.messages[i].role, content: conv.messages[i].content });
  }

  var options = {};
  if (temp !== 0.7) options.temperature = temp;
  if (topP !== 0.9) options.top_p = topP;
  if (ctxLen !== 4096) options.num_ctx = ctxLen;
  if (maxTok > 0) options.num_predict = maxTok;

  abortController = new AbortController();

  fetch(BASE + '/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: model, messages: apiMessages, stream: true, options: options }),
    signal: abortController.signal
  }).then(function(r) {
    var el = document.getElementById('typingIndicator');
    if (el) el.remove();

    var assistantDiv = document.createElement('div');
    assistantDiv.className = 'msg assistant';
    assistantDiv.innerHTML = '<div class="bubble"></div><div class="meta"></div>';
    area.appendChild(assistantDiv);
    var bubble = assistantDiv.querySelector('.bubble');
    var metaEl = assistantDiv.querySelector('.meta');

    var fullText = '';
    var reader = r.body.getReader();
    var decoder = new TextDecoder();

    function readChunk() {
      reader.read().then(function(result) {
        if (result.done) {
          finishMessage(fullText, model, metaEl, bubble);
          return;
        }
        var chunk = decoder.decode(result.value, { stream: true });
        var lines = chunk.split('\n');
        for (var j = 0; j < lines.length; j++) {
          if (!lines[j].startsWith('data: ')) continue;
          try {
            var data = JSON.parse(lines[j].slice(6));
            if (data.message && data.message.content) {
              fullText += data.message.content;
              bubble.innerHTML = renderMarkdown(fullText);
              area.scrollTop = area.scrollHeight;
            }
            if (data.done) {
              finishMessage(fullText, model, metaEl, bubble);
              return;
            }
          } catch (e) {}
        }
        readChunk();
      }).catch(function(e) {
        if (e.name !== 'AbortError') {
          finishMessage(fullText || 'Error: ' + e, model, metaEl, bubble);
        } else {
          finishMessage(fullText || '(generation stopped)', model, metaEl, bubble);
        }
      });
    }
    readChunk();
  }).catch(function(e) {
    var el = document.getElementById('typingIndicator');
    if (el) el.remove();
    if (e.name !== 'AbortError') {
      conv.messages.push({ role: 'assistant', content: 'Error: ' + e, time: Date.now(), model: model });
      renderMessages();
    }
    resetSendButton();
  });
}

function finishMessage(fullText, model, metaEl, bubble) {
  var conv = conversations[currentChatId];
  conv.messages.push({ role: 'assistant', content: fullText, time: Date.now(), model: model });
  var time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  metaEl.innerHTML = escapeHtml(model) + ' &middot; ' + time;
  bubble.innerHTML = renderMarkdown(fullText);
  saveConversations();
  resetSendButton();
}

function resetSendButton() {
  streaming = false;
  abortController = null;
  var sendBtn = document.getElementById('sendBtn');
  sendBtn.textContent = 'Send';
  sendBtn.className = 'send-btn';
  sendBtn.onclick = sendMessage;
  sendBtn.disabled = false;
  document.getElementById('msgInput').focus();
}

function stopGeneration() {
  if (abortController) abortController.abort();
  resetSendButton();
}

// ── Pull / Delete Models ────────────────────────────────────────
function pullModel() {
  var input = document.getElementById('pullInput');
  var name = input.value.trim();
  if (!name) return;
  var status = document.getElementById('pullStatus');
  status.textContent = 'Pulling ' + name + '...';

  fetch(BASE + '/api/models/pull', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: name })
  }).then(function(r) {
    var reader = r.body.getReader();
    var decoder = new TextDecoder();
    function read() {
      reader.read().then(function(result) {
        if (result.done) return;
        var chunk = decoder.decode(result.value);
        var lines = chunk.split('\n');
        for (var j = 0; j < lines.length; j++) {
          if (!lines[j].startsWith('data: ')) continue;
          try {
            var data = JSON.parse(lines[j].slice(6));
            if (data.status) {
              var pct = (data.completed && data.total) ? ' ' + Math.round(data.completed / data.total * 100) + '%' : '';
              status.textContent = data.status + pct;
            }
            if (data.status === 'success') {
              status.textContent = name + ' pulled successfully!';
              loadModels();
              input.value = '';
            }
            if (data.error) status.textContent = 'Error: ' + data.error;
          } catch (e) {}
        }
        read();
      });
    }
    read();
  }).catch(function(e) { status.textContent = 'Error: ' + e; });
}

function deleteModel(name) {
  if (!confirm('Delete model "' + name + '"?')) return;
  fetch(BASE + '/api/models/delete', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: name })
  }).then(function() { loadModels(); });
}

// ── UI Toggles ──────────────────────────────────────────────────
function toggleModels() { document.getElementById('modelsPanel').classList.toggle('open'); }
function toggleSettings() {
  var panel = document.getElementById('settingsPanel');
  var btn = document.getElementById('settingsBtn');
  panel.classList.toggle('open');
  btn.classList.toggle('active');
}

// ── Range sliders ───────────────────────────────────────────────
document.getElementById('temperature').addEventListener('input', function() {
  document.getElementById('tempVal').textContent = this.value;
});
document.getElementById('topP').addEventListener('input', function() {
  document.getElementById('topPVal').textContent = this.value;
});

// ── Auto-resize textarea ────────────────────────────────────────
document.getElementById('msgInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 200) + 'px';
});
document.getElementById('msgInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (streaming) return;
    sendMessage();
  }
});

// ── Model change save ───────────────────────────────────────────
document.getElementById('modelSelect').addEventListener('change', function() {
  savedModel = this.value;
  saveSettings();
});

// ── Init ────────────────────────────────────────────────────────
loadConversations();
var settings = loadSettings();
if (settings && settings.model) savedModel = settings.model;

var keys = Object.keys(conversations);
if (keys.length > 0) {
  keys.sort(function(a, b) { return (conversations[b].created || 0) - (conversations[a].created || 0); });
  currentChatId = keys[0];
}
renderChatList();
renderMessages();
checkHealth();
setInterval(checkHealth, 15000);
</script>
