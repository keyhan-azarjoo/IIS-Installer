<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ollama Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;height:100vh;display:flex;flex-direction:column}
.header{background:#1e293b;border-bottom:1px solid #334155;padding:12px 24px;display:flex;align-items:center;gap:16px;flex-shrink:0}
.header h1{font-size:20px;font-weight:800;color:#60a5fa;flex-grow:0}
.header select{background:#334155;color:#e2e8f0;border:1px solid #475569;border-radius:8px;padding:8px 12px;font-size:14px;outline:none;min-width:200px}
.header select:focus{border-color:#60a5fa}
.header .status{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:13px;color:#94a3b8}
.header .status .dot{width:8px;height:8px;border-radius:50%;background:#ef4444}
.header .status .dot.ok{background:#22c55e}
.header .btn-sm{background:#334155;color:#94a3b8;border:1px solid #475569;border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer}
.header .btn-sm:hover{background:#475569;color:#e2e8f0}
.chat-area{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
.msg{max-width:80%;display:flex;flex-direction:column;gap:4px}
.msg.user{align-self:flex-end}.msg.assistant{align-self:flex-start}
.msg .bubble{padding:14px 18px;border-radius:16px;line-height:1.6;font-size:15px;white-space:pre-wrap;word-break:break-word}
.msg.user .bubble{background:#2563eb;color:#fff;border-bottom-right-radius:4px}
.msg.assistant .bubble{background:#1e293b;color:#e2e8f0;border:1px solid #334155;border-bottom-left-radius:4px}
.msg .meta{font-size:11px;color:#64748b;padding:0 4px}
.msg.user .meta{text-align:right}
.typing{align-self:flex-start;color:#64748b;font-size:14px;padding:8px 0}
.typing span{animation:blink 1.4s infinite both}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}
.empty{text-align:center;margin:auto;color:#475569}
.empty h2{font-size:28px;font-weight:800;color:#334155;margin-bottom:8px}
.empty p{font-size:15px;max-width:400px;line-height:1.6}
.input-area{background:#1e293b;border-top:1px solid #334155;padding:16px 24px;flex-shrink:0}
.input-row{display:flex;gap:12px;max-width:900px;margin:0 auto}
.input-row textarea{flex:1;background:#0f172a;color:#e2e8f0;border:1px solid #334155;border-radius:12px;padding:12px 16px;font-size:15px;font-family:inherit;resize:none;outline:none;min-height:48px;max-height:200px}
.input-row textarea:focus{border-color:#60a5fa}
.input-row textarea::placeholder{color:#475569}
.send-btn{background:#2563eb;color:#fff;border:none;border-radius:12px;padding:0 20px;font-size:15px;font-weight:700;cursor:pointer;min-width:80px;transition:all .15s}
.send-btn:hover{background:#1d4ed8}
.send-btn:disabled{background:#334155;color:#64748b;cursor:not-allowed}
.models-panel{position:fixed;top:0;right:0;width:380px;height:100vh;background:#1e293b;border-left:1px solid #334155;z-index:100;transform:translateX(100%);transition:transform .3s ease;overflow-y:auto;padding:24px}
.models-panel.open{transform:translateX(0)}
.models-panel h2{font-size:18px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.models-panel .close-btn{background:none;border:none;color:#94a3b8;font-size:24px;cursor:pointer}
.model-card{background:#0f172a;border:1px solid #334155;border-radius:10px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.model-card .name{flex:1;font-weight:600;font-size:14px}
.model-card .size{color:#64748b;font-size:12px}
.model-card .del-btn{background:#7f1d1d;color:#fca5a5;border:none;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer}
.pull-row{display:flex;gap:8px;margin-bottom:16px}
.pull-row input{flex:1;background:#0f172a;color:#e2e8f0;border:1px solid #334155;border-radius:8px;padding:10px;font-size:14px;outline:none}
.pull-row button{background:#2563eb;color:#fff;border:none;border-radius:8px;padding:10px 16px;font-weight:700;cursor:pointer}
.pull-status{font-size:12px;color:#94a3b8;margin-bottom:12px;min-height:18px}
pre code{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:12px;display:block;overflow-x:auto;font-size:13px;line-height:1.5}
</style>
</head>
<body>

<div class="header">
  <h1>Ollama</h1>
  <select id="modelSelect"><option value="">Loading models...</option></select>
  <div class="status"><div class="dot" id="statusDot"></div><span id="statusText">Checking...</span></div>
  <button class="btn-sm" onclick="toggleModels()">Models</button>
  <button class="btn-sm" onclick="clearChat()">Clear</button>
</div>

<div class="chat-area" id="chatArea">
  <div class="empty" id="emptyState">
    <h2>Ollama Chat</h2>
    <p>Select a model and start chatting. Pull new models from the Models panel.</p>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="msgInput" placeholder="Type a message... (Enter to send, Shift+Enter for new line)" rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
  </div>
</div>

<div class="models-panel" id="modelsPanel">
  <h2>Models <button class="close-btn" onclick="toggleModels()">&times;</button></h2>
  <div class="pull-row">
    <input id="pullInput" placeholder="e.g. llama3.2, mistral, gemma2" onkeydown="if(event.key==='Enter')pullModel()">
    <button onclick="pullModel()">Pull</button>
  </div>
  <div class="pull-status" id="pullStatus"></div>
  <div id="modelsList"></div>
</div>

<script>
const BASE = '';
let messages = [];
let streaming = false;

async function checkHealth() {
  try {
    const r = await fetch(BASE + '/api/health');
    const j = await r.json();
    document.getElementById('statusDot').className = 'dot' + (j.ok ? ' ok' : '');
    document.getElementById('statusText').textContent = j.ok ? 'Connected' : 'Disconnected';
    return j.ok;
  } catch(e) {
    document.getElementById('statusDot').className = 'dot';
    document.getElementById('statusText').textContent = 'Disconnected';
    return false;
  }
}

async function loadModels() {
  try {
    const r = await fetch(BASE + '/api/models');
    const j = await r.json();
    const sel = document.getElementById('modelSelect');
    const models = j.models || [];
    sel.innerHTML = models.length ? '' : '<option value="">No models — pull one first</option>';
    models.forEach(m => {
      const name = m.name || m.model;
      const size = m.size ? (m.size/1e9).toFixed(1)+'GB' : '';
      const opt = document.createElement('option');
      opt.value = name; opt.textContent = name + (size ? ' ('+size+')' : '');
      sel.appendChild(opt);
    });
    // Models panel
    const list = document.getElementById('modelsList');
    list.innerHTML = models.map(m => {
      const name = m.name||m.model;
      const size = m.size ? (m.size/1e9).toFixed(1)+' GB' : '';
      return '<div class="model-card"><span class="name">'+name+'</span><span class="size">'+size+'</span><button class="del-btn" onclick="deleteModel(\''+name+'\')">Delete</button></div>';
    }).join('');
  } catch(e) {}
}

function addMessage(role, content) {
  const area = document.getElementById('chatArea');
  document.getElementById('emptyState').style.display = 'none';
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const time = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  div.innerHTML = '<div class="bubble"></div><div class="meta">' + time + '</div>';
  div.querySelector('.bubble').textContent = content;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function showTyping() {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'typing'; div.id = 'typingIndicator';
  div.innerHTML = '<span>●</span><span>●</span><span>●</span>';
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}
function hideTyping() { const el = document.getElementById('typingIndicator'); if(el) el.remove(); }

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  const model = document.getElementById('modelSelect').value;
  if (!text || !model || streaming) return;

  messages.push({role:'user', content:text});
  addMessage('user', text);
  input.value = ''; input.style.height = 'auto';
  streaming = true;
  document.getElementById('sendBtn').disabled = true;
  showTyping();

  try {
    const r = await fetch(BASE + '/api/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({model, messages, stream:true})
    });
    hideTyping();
    const assistantDiv = addMessage('assistant', '');
    const bubble = assistantDiv.querySelector('.bubble');
    let fullText = '';
    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    while(true) {
      const {done, value} = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, {stream:true});
      for (const line of chunk.split('\n')) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          if (data.message && data.message.content) {
            fullText += data.message.content;
            bubble.textContent = fullText;
            document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
          }
        } catch(e) {}
      }
    }
    messages.push({role:'assistant', content:fullText});
  } catch(e) {
    hideTyping();
    addMessage('assistant', 'Error: ' + e);
  }
  streaming = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

async function pullModel() {
  const input = document.getElementById('pullInput');
  const name = input.value.trim();
  if (!name) return;
  const status = document.getElementById('pullStatus');
  status.textContent = 'Pulling ' + name + '...';
  try {
    const r = await fetch(BASE + '/api/models/pull', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({name})
    });
    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    while(true) {
      const {done, value} = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      for (const line of chunk.split('\n')) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          if (data.status) status.textContent = data.status + (data.completed ? ' ' + Math.round(data.completed/data.total*100) + '%' : '');
          if (data.status === 'success') { status.textContent = name + ' pulled successfully!'; loadModels(); input.value = ''; }
          if (data.error) status.textContent = 'Error: ' + data.error;
        } catch(e) {}
      }
    }
  } catch(e) { status.textContent = 'Error: ' + e; }
}

async function deleteModel(name) {
  if (!confirm('Delete model "'+name+'"?')) return;
  await fetch(BASE+'/api/models/delete', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name})});
  loadModels();
}

function toggleModels() { document.getElementById('modelsPanel').classList.toggle('open'); }
function clearChat() { messages=[]; document.getElementById('chatArea').innerHTML='<div class="empty" id="emptyState"><h2>Ollama Chat</h2><p>Select a model and start chatting.</p></div>'; }

// Auto-resize textarea
document.getElementById('msgInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 200) + 'px';
});
document.getElementById('msgInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// Init
checkHealth().then(ok => { if(ok) loadModels(); });
setInterval(checkHealth, 15000);
</script>
</body>
</html>
